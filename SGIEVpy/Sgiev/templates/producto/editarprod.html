{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>
    <link rel="stylesheet" href="{% static 'css/styleform.css' %}">
</head>
<body>

    <div class="form-container">
        <h2>Editar Producto</h2>

        <form action="{% url 'editar_producto' producto.id %}" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombreProd" value="{{ producto.nombre_producto }}" required>
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <input type="text" name="descProd" value="{{ producto.descripcion_producto }}" required>
            </div>

            <div class="form-group">
                <label>Código de Barras</label>
                <input type="text" name="codProd" value="{{ producto.codigo_barras }}" required>
            </div>

            <div class="form-group">
                <label>Registro Sanitario</label>
                <input type="text" name="regProd" value="{{ producto.registrosaniario }}" required>
            </div>

            <div class="form-group">
                <label>Precio Compra</label>
                <input type="number" step="0.01" name="precioCompra" value="{{ producto.precio_compra }}" required>
            </div>

            <div class="form-group">
                <label>Precio Venta</label>
                <input type="number" step="0.01" name="precioVenta" value="{{ producto.precio_venta }}" required>
            </div>

            <div class="form-group">
                <label>Margen Ganancia</label>
                <input type="number" step="0.01" name="margenProd" value="{{ producto.margen_ganancia }}" required>
            </div>

            <div class="form-group">
                <label>Stock Actual</label>
                <input type="number" name="stockAct" value="{{ producto.stock_actual }}" required>
            </div>

            <div class="form-group">
                <label>Stock Mínimo</label>
                <input type="number" name="stockMin" value="{{ producto.stock_minimo }}" required>
            </div>

            <div class="form-group">
                <label>Stock Máximo</label>
                <input type="number" name="stockMax" value="{{ producto.stock_maximo }}" required>
            </div>

            <div class="form-group">
                <label>Fecha Vencimiento</label>
                <input type="date" name="fechaVen" value="{{ producto.fecha_vencimiento|date:'Y-m-d' }}" required>
            </div>

            <div class="form-group">
                <label>Categoría</label>
                <select name="categoria" required>
                    {% for c in categorias %}
                    <option value="{{ c.id }}" {% if c.id == producto.categoria_idcategoria.id %}selected{% endif %}>{{ c.nombre_categoria }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Proveedor</label>
                <select name="proveedor" required>
                    {% for p in proveedores %}
                    <option value="{{ p.id }}" {% if p.id == producto.proveedor_idproveedor.id %}selected{% endif %}>{{ p.nombre_proveedor }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Estado</label>
                <select name="estadoProd">
                    <option value="1" {% if producto.activo == 1 %}selected{% endif %}>Activo</option>
                    <option value="0" {% if producto.activo == 0 %}selected{% endif %}>Inactivo</option>
                </select>
            </div>

            <input type="submit" value="Actualizar" class="btn-submit">
            <a href="{% url 'list_producto' %}" class="btn-submit">Cancelar</a>
        </form>
    </div>

</body>
</html>
