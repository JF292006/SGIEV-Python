{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Registrar Producto | Romar Natural</title>

  <!-- Bootstrap & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
  <div class="d-flex">
   
    <div id="sidebar-container" class="bg-primary">
      <div class="logo">
        <h4 class="text-light font-weight-bold">Romar Natural</h4>
      </div>
      <div class="menu">
        <a href="{% url 'dashboard' %}" class="d-block text-light p-3"><i class="icon ion-md-apps mr-2"></i>Panel</a>
        <a href="{% url 'usuarios_listar' %}" class="d-block text-light p-3"><i class="icon ion-md-contacts mr-2"></i>Usuarios</a>
        <a href="{% url 'listar_proveedores' %}" class="d-block text-light p-3"><i class="icon ion-md-cube mr-2"></i>Proveedores</a>
        <a href="{% url 'list_categoria' %}" class="d-block text-light p-3"><i class="icon ion-md-copy mr-2"></i>Categoria</a>
        <a href="{% url 'list_producto' %}" class="d-block text-light p-3 active"><i class="icon ion-md-folder mr-2"></i>Inventario</a>
      </div>
    </div>

    
    <div class="w-100">
      
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <form class="form-inline my-2 my-lg-0 ml-0 d-flex align-items-center">
            <input class="form-control mr-2" type="search" placeholder="Buscar" aria-label="Buscar">
            <button class="btn btn-outline-success my-2 my-sm-0" type="button">
              <i class="icon ion-md-search"></i>
            </button>
          </form>

          <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">Administrador</a>
              <div class="dropdown-menu dropdown-menu-right">
                <a class="dropdown-item" href="#">Mi perfil</a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="#">Cerrar sesión</a>
              </div>
            </li>
          </ul>
        </div>
      </nav>

      
      <div id="content" class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="font-weight-bold text-success">Registrar Producto</h2>
          <a class="btn btn-secondary" href="{% url 'list_producto' %}">
            <i class="icon ion-md-arrow-back"></i> Volver al listado
          </a>
        </div>

        
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <form action="{% url 'registro_producto' %}" method="post">
              {% csrf_token %}
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="nombre_producto">Nombre</label>
                  <input type="text" id="nombre_producto" name="nombre_producto" class="form-control" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="codigo_barras">Lote</label>
                  <input type="text" id="codigo_barras" name="codigo_barras" class="form-control" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-12">
                  <label for="descripcion_producto">Descripción</label>
                  <input type="text" id="descripcion_producto" name="descripcion_producto" class="form-control" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-4">
                  <label for="precio_compra">Precio Compra</label>
                  <input type="number" step="0.01" id="precio_compra" name="precio_compra" class="form-control" required>
                </div>

                <div class="form-group col-md-4">
                  <label for="precio_venta">Precio Venta</label>
                  <input type="number" step="0.01" id="precio_venta" name="precio_venta" class="form-control" required>
                </div>

                <div class="form-group col-md-4">
                  <label for="margen_ganancia">Margen (%)</label>
                  <input type="number" step="0.01" id="margen_ganancia" name="margen_ganancia" class="form-control" required readonly>
                </div>
              </div>

              <div class="form-row">

                <div class="form-group col-md-4">
                  <label for="stock_minimo">Stock Mínimo</label>
                  <input type="number" id="stock_minimo" name="stock_minimo" class="form-control" required>
                </div>

                <div class="form-group col-md-4">
                  <label for="stock_maximo">Stock Máximo</label>
                  <input type="number" id="stock_maximo" name="stock_maximo" class="form-control" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="fecha_vencimiento">Fecha Vencimiento</label>
                  <input type="date" id="fecha_vencimiento" name="fecha_vencimiento" class="form-control" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="registrosanitario">Registro Sanitario</label>
                  <input type="text" id="registrosanitario" name="registrosanitario" class="form-control" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="categoria_idcategoria">Categoría</label>
                  <select id="categoria_idcategoria" name="categoria_idcategoria" class="form-control" required>
                    <option value="">Seleccione</option>
                    {% for c in categorias %}<option value="{{ c.id }}">{{ c.nombre_categoria }}</option>{% endfor %}
                  </select>
                </div>

                <div class="form-group col-md-6">
                  <label for="proveedor_idproveedor">Proveedor</label>
                  <select id="proveedor_idproveedor" name="proveedor_idproveedor" class="form-control" required>
                    <option value="">Seleccione</option>
                    {% for p in proveedores %}<option value="{{ p.id }}">{{ p.nombre_proveedor }}</option>{% endfor %}
                  </select>
                </div>
              </div>

              <div class="text-right mt-4">
                <button type="submit" class="btn btn-success px-4">
                  <i class="icon ion-md-checkmark"></i> Registrar
                </button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
  <script>
      document.addEventListener('DOMContentLoaded', function() {
          const precioCompra = document.getElementById('precio_compra');
          const precioVenta = document.getElementById('precio_venta');
          const margenGanancia = document.getElementById('margen_ganancia');

          function calcularMargen() {
           
              const compra = parseFloat(precioCompra.value) || 0;
              const venta = parseFloat(precioVenta.value) || 0;

              if (compra > 0) {
       
                  const margen = ((venta - compra) / compra) * 100;
                  margenGanancia.value = margen.toFixed(2);
              } else {
  
                  margenGanancia.value = '0.00';
              }
          }


          precioCompra.addEventListener('input', calcularMargen);
          precioVenta.addEventListener('input', calcularMargen);
          

          calcularMargen(); 
      });
  </script>
</body>
</html>
