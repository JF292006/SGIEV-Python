{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Producto</title>
    <link rel="stylesheet" href="{% static 'css/styleform.css' %}">
</head>
<body>

    <div class="form-container">
        <h2>Registro de Producto</h2>

        <form action="{% url 'registro_producto' %}" method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombreProd" required>
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <input type="text" name="descProd" required>
            </div>

            <div class="form-group">
                <label>Código de Barras</label>
                <input type="text" name="codProd" required>
            </div>

            <div class="form-group">
                <label>Registro Sanitario</label>
                <input type="text" name="regProd" required>
            </div>

            <div class="form-group">
                <label>Precio Compra</label>
                <input type="number" step="0.01" name="precioCompra" required>
            </div>

            <div class="form-group">
                <label>Precio Venta</label>
                <input type="number" step="0.01" name="precioVenta" required>
            </div>

            <div class="form-group">
                <label>Margen Ganancia (%)</label>
                <input type="number" step="0.01" name="margenProd" required>
            </div>

            <div class="form-group">
                <label>Stock Actual</label>
                <input type="number" name="stockAct" required>
            </div>

            <div class="form-group">
                <label>Stock Mínimo</label>
                <input type="number" name="stockMin" required>
            </div>

            <div class="form-group">
                <label>Stock Máximo</label>
                <input type="number" name="stockMax" required>
            </div>

            <div class="form-group">
                <label>Fecha Vencimiento</label>
                <input type="date" name="fechaVen" required>
            </div>

            <div class="form-group">
                <label>Categoría</label>
                <select name="categoria" required>
                    <option value="">Seleccione</option>
                    {% for c in categorias %}
                    <option value="{{ c.id }}">{{ c.nombre_categoria }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Proveedor</label>
                <select name="proveedor" required>
                    <option value="">Seleccione</option>
                    {% for p in proveedores %}
                    <option value="{{ p.id }}">{{ p.nombre_proveedor }}</option>
                    {% endfor %}
                </select>
            </div>

            <input type="submit" value="Registrar" class="btn-submit">
        </form>
    </div>

</body>
</html>
