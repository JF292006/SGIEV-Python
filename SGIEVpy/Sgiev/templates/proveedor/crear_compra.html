{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Compra | Romar Natural</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <div id="sidebar-container" class="bg-primary">
      <div class="logo">
        <h4 class="text-light font-weight-bold">Romar Natural</h4>
      </div>
      <div class="menu">
        <a href="{% url 'dashboard' %}" class="d-block text-light p-3"><i class="icon ion-md-apps mr-2"></i>Panel</a>
        <a href="{% url 'listar_proveedores' %}" class="d-block text-light p-3 active"><i class="icon ion-md-cube mr-2 lead"></i>Proveedores</a>
        <a href="#" class="d-block text-light p-3"><i class="icon ion-md-cart mr-2 lead"></i>Ventas</a>
        <a href="#" class="d-block text-light p-3"><i class="icon ion-md-folder mr-2 lead"></i>Inventario</a>
      </div>
    </div>

    <!-- Main -->
    <div class="w-100">
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <form class="form-inline my-2 my-lg-0 ml-0 d-flex align-items-center">
            <input class="form-control mr-2" type="search" placeholder="Buscar" aria-label="Buscar">
            <button class="btn btn-outline-success my-2 my-sm-0" type="button">
              <i class="icon ion-md-search"></i>
            </button>
          </form>
          <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">Administrador</a>
            </li>
          </ul>
        </div>
      </nav>

      <div id="content" class="p-4">
  <div class="card-compra">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="text-success mb-0">Nueva Compra a {{ proveedor.nombre_proveedor }}</h3>
      <small class="text-muted">Proveedor ID: {{ proveedor.pk }}</small>
    </div>

    <form id="form_compra" method="POST" novalidate>
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group col-md-6">
          <label>Tipo de producto</label>
          <select class="form-control" id="tipo_producto" name="tipo_producto">
              <option value="existente">Producto Existente</option>
              <option value="nuevo">Producto Nuevo</option>
          </select>
        </div>

        <div class="form-group col-md-6">
          <label>Número factura (opcional)</label>
          <input type="text" class="form-control" name="numero_factura">
        </div>
      </div>

      <!-- EXISTENTE -->
      <div id="producto_existente_box" class="mb-3">
        <label>Seleccionar producto</label>
        <select class="form-control" name="producto_id">
            {% for pr in productos %}
              <option value="{{ pr.id }}">{{ pr.nombre_producto }} — Stock: {{ pr.stock_actual }}</option>
            {% endfor %}
        </select>
      </div>

      <!-- NUEVO (fragmento incluido) -->
      <div id="producto_nuevo_box" style="display:none;" class="mb-3">
        {% include 'producto/nuevoprod.html' %}
      </div>

      <div class="form-row">
        <div class="form-group col-md-4">
          <label>Cantidad</label>
          <input type="number" class="form-control" name="cantidad" min="1" value="1" required>
        </div>
        <div class="form-group col-md-4">
          <label>Precio unitario</label>
          <input type="number" step="0.01" class="form-control" name="valor_unitario" required>
        </div>
        <div class="form-group col-md-4">
          <label>Fecha vencimiento (opcional)</label>
          <input type="date" class="form-control" name="fecha_vencimiento">
        </div>
      </div>

      <div class="form-group">
        <label>Lote (opcional)</label>
        <input type="text" class="form-control" name="lote">
      </div>

      <div class="form-group">
        <label>Observaciones</label>
        <textarea name="observaciones" class="form-control" rows="3"></textarea>
      </div>

      <div class="form-group">
  <label>Estado de la compra</label>
  <select class="form-control" name="estado_compra">
      <option value="pendiente" selected>Pendiente</option>
      <option value="recibida">Recibida</option>
      <option value="cancelada">Cancelada</option>
  </select>
</div>


      <div class="d-flex justify-content-end compra-actions">
        <!-- explicit type submit -->
        <button type="submit" class="btn btn-success btn-lg">Registrar Compra</button>
      </div>
    </form>
  </div>
</div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

  <script>
      const tipo = document.getElementById("tipo_producto");
      const nuevo = document.getElementById("producto_nuevo_box");
      const existente = document.getElementById("producto_existente_box");

      tipo.addEventListener("change", () => {
          if (tipo.value === "nuevo") {
              nuevo.style.display = "block";
              existente.style.display = "none";
          } else {
              nuevo.style.display = "none";
              existente.style.display = "block";
          }
      });
  </script>

  <script>
document.addEventListener('DOMContentLoaded', function(){
  const tipo = document.getElementById('tipo_producto');
  const nuevoBox = document.getElementById('producto_nuevo_box');
  const existenteBox = document.getElementById('producto_existente_box');
  const form = document.getElementById('form_compra');

  if(tipo){
    tipo.addEventListener('change', function(){
      if(this.value === 'nuevo'){
        nuevoBox.style.display = 'block';
        existenteBox.style.display = 'none';
      } else {
        nuevoBox.style.display = 'none';
        existenteBox.style.display = 'block';
      }
    });
  }

  if(form){
    form.addEventListener('submit', function(e){
   
    });
  }
});
</script>

</body>
</html>
