{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Editar Proveedor | Romar Natural</title>

  <!-- Bootstrap & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <link href="https://unpkg.com/ionicons@4.5.10-0/dist/css/ionicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
  <div class="d-flex">
    <!-- Sidebar -->
    <div id="sidebar-container" class="bg-primary">
      <div class="logo">
        <h4 class="text-light font-weight-bold">Romar Natural</h4>
      </div>
      <div class="menu">
        <a href="#" class="d-block text-light p-3"><i class="icon ion-md-contacts mr-2 lead"></i>Usuarios</a>
        <a href="{% url 'listar_proveedores' %}" class="d-block text-light p-3 active"><i class="icon ion-md-cube mr-2 lead"></i>Proveedores</a>
        <a href="#" class="d-block text-light p-3"><i class="icon ion-md-cart mr-2 lead"></i>Ventas</a>
        <a href="#" class="d-block text-light p-3"><i class="icon ion-md-folder mr-2 lead"></i>Inventario</a>
      </div>
    </div>

    <!-- Main content -->
    <div class="w-100">
      <!-- Navbar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <form class="form-inline my-2 my-lg-0 ml-0 d-flex align-items-center">
            <input class="form-control mr-2" type="search" placeholder="Buscar" aria-label="Buscar">
            <button class="btn btn-outline-success my-2 my-sm-0" type="button">
              <i class="icon ion-md-search"></i>
            </button>
          </form>

          <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">Administrador</a>
              <div class="dropdown-menu dropdown-menu-right">
                <a class="dropdown-item" href="#">Mi perfil</a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="#">Cerrar sesión</a>
              </div>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Content -->
      <div id="content" class="p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="font-weight-bold text-success">Editar Proveedor</h2>
          <a class="btn btn-secondary" href="{% url 'listar_proveedores' %}">
            <i class="icon ion-md-arrow-back"></i> Volver al listado
          </a>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body">
            <form method="post">
              {% csrf_token %}
              
              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="nombre_proveedor">Nombre del proveedor</label>
                  <input type="text" id="nombre_proveedor" name="nombre_proveedor" class="form-control" value="{{ proveedor.nombre_proveedor }}" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="correo_proveedor">Correo electrónico</label>
                  <input type="email" id="correo_proveedor" name="correo_proveedor" class="form-control" value="{{ proveedor.correo_proveedor }}" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="telefono">Teléfono</label>
                  <input type="text" id="telefono" name="telefono" class="form-control" value="{{ proveedor.telefono }}" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="direccion">Dirección</label>
                  <input type="text" id="direccion" name="direccion" class="form-control" value="{{ proveedor.direccion }}" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="nit">NIT</label>
                  <input type="text" id="nit" name="nit" class="form-control" value="{{ proveedor.nit }}" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="activo">Activo</label>
                  <select id="activo" name="activo" class="form-control">
                    <option value="True" {% if proveedor.activo %}selected{% endif %}>Sí</option>
                    <option value="False" {% if not proveedor.activo %}selected{% endif %}>No</option>
                  </select>
                </div>
              </div>

              <hr>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label for="contacto_nombre">Nombre del contacto</label>
                  <input type="text" id="contacto_nombre" name="contacto_nombre" class="form-control" value="{{ proveedor.contacto_nombre }}" required>
                </div>

                <div class="form-group col-md-6">
                  <label for="contacto_telefono">Teléfono del contacto</label>
                  <input type="text" id="contacto_telefono" name="contacto_telefono" class="form-control" value="{{ proveedor.contacto_telefono }}" required>
                </div>
              </div>

              <div class="text-right mt-4">
                <button type="submit" class="btn btn-success px-4">
                  <i class="icon ion-md-checkmark"></i> Guardar cambios
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>
</html>
